scan:
  num_stocks: 500
  lookback_days: 30
  morning_minutes: 20

signals:
  # Dip: a minute where close <= open (flat or negative candle)
  # Stock jump: next minute's close rises by at least this many dollars
  stock_jump_min: 0.25
  # DJI jump: DJI rises by at least this many basis points during the dip minute
  dji_jump_min_bps: 19.0

alpaca:
  feed: "iex"
  max_requests_per_min: 200

output:
  results_csv: "output/buy_signals.csv"
  signals_csv: "output/signals_detail.csv"

cache:
  db_path: "cache/market_data.db"

dji_proxy:
  symbol: "DIA"
