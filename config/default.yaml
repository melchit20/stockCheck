scan:
  num_stocks: 500
  lookback_days: 30
  morning_minutes: 20

signals:
  # Dip: stock net flat/down over 5 min pre-market window (9:25-9:29 ET)
  # Stock jump: 9:30 bar close rises by at least this many dollars vs pre-market close
  stock_jump_min: 1.00
  # DJI jump: DIA net change ≥ this many bps over the pre-market window
  dji_jump_min_bps: 19.0
  # Pre-market window: minutes before market open to check for dip/DJI jump
  premarket_minutes: 15

alpaca:
  feed: "iex"
  max_requests_per_min: 200

output:
  results_csv: "output/buy_signals.csv"
  signals_csv: "output/signals_detail.csv"

cache:
  db_path: "cache/market_data.db"

dji_proxy:
  symbol: "DIA"
