{% extends "base.html" %}
{% block title %}Sign In — Paper Trading{% endblock %}
{% block body %}
<div class="min-h-full flex items-center justify-center">
  <div class="bg-gray-800 rounded-2xl shadow-xl p-10 w-full max-w-md text-center">
    <div class="mb-6">
      <div class="text-4xl mb-2">📈</div>
      <h1 class="text-2xl font-bold">Paper Trading Bot</h1>
      <p class="text-gray-400 mt-1 text-sm">Options scalping — TSLA · APP · AMD</p>
    </div>

    {% if error %}
    <div class="bg-red-900/50 border border-red-700 rounded-lg p-3 mb-6 text-sm text-red-300">
      {{ error }}
    </div>
    {% endif %}

    <a href="{{ url_for('auth_login') }}"
       class="inline-flex items-center gap-3 bg-white text-gray-800 font-semibold
              rounded-lg px-6 py-3 hover:bg-gray-100 transition">
      <svg class="w-5 h-5" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign in with Google
    </a>
    <p class="text-gray-500 text-xs mt-6">Access restricted to authorized accounts.</p>
  </div>
</div>
{% endblock %}
